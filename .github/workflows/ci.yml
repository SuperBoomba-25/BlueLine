name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      # ❌ צעד ה-Fix ESLint permissions הוסר - אין בו צורך כשמשתמשים ב-npm run.

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint # ✅ שימוש ב-npm run lint (מבטיח שהפקודה נמצאת בנתיב הנכון)

      - name: Build frontend
        working-directory: frontend
        run: npx react-scripts build # אפשר לשנות ל-npm run build

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run backend tests
        working-directory: backend
        run: npm test
